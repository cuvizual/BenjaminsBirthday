<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Benjamin's Pokemon Party!</title>
<style>
/* Existing styles preserved exactly as they were in your file */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d3b8c; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial, sans-serif; padding: 20px 16px; }
.screen { display: none; width: 100%; max-width: 400px; }
.screen.active { display: flex; flex-direction: column; align-items: center; }
#screen-pokeball { min-height: 90vh; justify-content: center; }
.pb-title { font-size: 13px; font-weight: 700; color: #F9D000; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 32px; text-align: center; opacity: 0.85; }
.pb-wrap { position: relative; width: 220px; height: 220px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.pb-wrap svg { width: 100%; height: 100%; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 18px 32px rgba(0,0,0,0.55)) drop-shadow(0 0 40px rgba(229,57,53,0.35)); transition: transform 0.12s; }
.pb-wrap:active svg { transform: scale(0.93); animation: none; }
@keyframes float { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-16px) rotate(3deg); } }
.pb-shadow { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 120px; height: 18px; background: radial-gradient(ellipse, rgba(0,0,0,0.45) 0%, transparent 70%); border-radius: 50%; animation: shadow-pulse 3s ease-in-out infinite; pointer-events: none; }
@keyframes shadow-pulse { 0%,100% { transform: translateX(-50%) scaleX(1); opacity: 0.6; } 50% { transform: translateX(-50%) scaleX(0.6); opacity: 0.25; } }
.tap-hint { margin-top: 40px; font-size: 15px; color: #F9D000; font-weight: 700; letter-spacing: 2px; text-align: center; text-transform: uppercase; animation: pulse 1.8s ease-in-out infinite; }
.tap-hint span { display: inline-block; margin-right: 6px; animation: tap-icon 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
@keyframes tap-icon { 0%,100% { transform:scale(1); } 50% { transform:scale(1.3); } }
.card { background: #1565C0; border: 5px solid #F9D000; border-radius: 18px; overflow: hidden; box-shadow: 0 0 0 2px #0d3b8c, 0 0 0 5px #F9D000; width: 100%; }
.card-header { background: #1565C0; display: flex; align-items: center; gap: 10px; padding: 14px 14px 10px; border-bottom: 3px solid #F9D000; }
.header-name { font-size: 28px; font-weight: 900; color: #F9D000; letter-spacing: 1px; text-transform: uppercase; font-style: italic; line-height: 1; }
.scene { width: 100%; height: 200px; background: linear-gradient(to bottom, #74c8f0 0%, #a8dfff 55%, #7ec87e 55%, #5aad5a 100%); display: flex; align-items: flex-end; justify-content: center; overflow: hidden; position: relative; }
.scene-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.card-body { background: #1565C0; padding: 12px 14px 8px; }
.tagline { font-size: 15px; font-weight: 900; color: #F9D000; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 12px; }
.info-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.info-text { font-size: 13px; color: #fff; font-weight: 600; line-height: 1.5; }
.address-link { color: #fff; text-decoration: underline; text-decoration-color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 600; line-height: 1.5; display: block; }
.action-buttons { display: flex; gap: 8px; margin-top: 12px; margin-bottom: 4px; }
.action-btn { flex: 1; padding: 10px 6px; border-radius: 30px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-align: center; text-decoration: none; display: block; cursor: pointer; border: none; }
.btn-registry { background: transparent; border: 2px solid #F9D000; color: #F9D000; }
.btn-rsvp { background: #F9D000; color: #1565C0; }
.admin-icon { position: absolute; bottom: 14px; right: 14px; width: 28px; height: 28px; cursor: pointer; opacity: 0.35; -webkit-tap-highlight-color: transparent; }
.invite-footer { position: relative; background: #F9D000; padding: 9px 14px; text-align: center; font-size: 12px; font-weight: 900; color: #1565C0; text-transform: uppercase; letter-spacing: 1px; }
.back-btn { margin-top: 20px; background: transparent; border: 2px solid #F9D000; color: #F9D000; font-size: 13px; font-weight: 700; padding: 10px 28px; border-radius: 30px; cursor: pointer; display: block; width: 100%; text-transform: uppercase; }
.form-body { background: #1565C0; padding: 16px 16px 4px; }
.form-label { display: block; font-size: 11px; font-weight: 700; color: #F9D000; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.form-input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 2px solid #F9D000; background: rgba(255,255,255,0.1); color: #fff; font-size: 14px; font-weight: 600; margin-bottom: 14px; outline: none; }
.attend-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.toggle-btn { flex: 1; padding: 10px 6px; border-radius: 30px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-align: center; cursor: pointer; border: 2px solid #F9D000; background: transparent; color: #F9D000; }
.toggle-btn.selected { background: #F9D000; color: #1565C0; }
.submit-btn { width: 100%; padding: 12px; border-radius: 30px; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; background: #F9D000; color: #1565C0; border: none; cursor: pointer; margin-bottom: 14px; }
.form-msg { font-size: 12px; color: #fff; text-align: center; padding: 8px; border-radius: 8px; margin-bottom: 12px; display: none; }
.form-msg.success { background: rgba(76,175,80,0.3); display: block; }
.form-msg.error { background: rgba(229,57,53,0.3); display: block; }
.dashboard-body { background: #1565C0; padding: 14px 14px 8px; }
.dash-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.dash-tab { flex: 1; padding: 8px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; text-align: center; cursor: pointer; border: 2px solid #F9D000; color: #F9D000; }
.dash-tab.active { background: #F9D000; color: #1565C0; }
.rsvp-item { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border-left: 4px solid #F9D000; }
.rsvp-item.declined { border-left-color: #ef5350; }
.rsvp-name { font-size: 13px; font-weight: 700; color: #fff; }
.rsvp-adult { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }
.rsvp-empty { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; padding: 20px 0; }
.dash-count { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.55); text-align: right; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="screen-pokeball" class="screen active">
  <p class="pb-title">You've been chosen!</p>
  <div class="pb-wrap" onclick="go('invite')">
    <div class="pb-shadow"></div>
    <svg viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="94" fill="#E53935"/>
      <path d="M6 100 A94 94 0 0 0 194 100 Z" fill="#fff"/>
      <rect x="6" y="91" width="188" height="18" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="24" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="18" fill="#fff"/>
    </svg>
  </div>
  <p class="tap-hint"><span>👆</span>Tap to open</p>
</div>

<div id="screen-invite" class="screen">
  <div class="card">
    <div class="card-header"><div class="header-name">Benjamin</div></div>
    <div class="scene"></div>
    <div class="card-body">
      <div class="tagline">I choose you to celebrate!</div>
      <div class="info-row"><span>⭐</span><div class="info-text">May 23rd, 2026 | 3:00 PM</div></div>
      <div class="info-row"><span>📍</span><div><a class="address-link" href="#">Sky Zone Pembroke Pines</a></div></div>
      <div class="action-buttons">
        <a class="action-btn btn-registry" href="#">🎁 Registry</a>
        <button class="action-btn btn-rsvp" onclick="go('rsvp')">RSVP Now</button>
      </div>
    </div>
    <div class="invite-footer">
      Please RSVP by May 13th
      <svg class="admin-icon" onclick="go('login')" viewBox="0 0 30 30"><circle cx="15" cy="15" r="14" fill="#fff" stroke="#333"/><path d="M1 15 A14 14 0 0 1 29 15 Z" fill="#E53935"/></svg>
    </div>
  </div>
</div>

<div id="screen-rsvp" class="screen">
  <div class="card">
    <div class="card-header"><div class="header-name">RSVP</div></div>
    <div class="form-body">
      <div id="form-msg" class="form-msg"></div>
      <label class="form-label">Child's name</label>
      <input class="form-input" id="kid-name" type="text" placeholder="Sofia"/>
      <label class="form-label">Parent name</label>
      <input class="form-input" id="adult-name" type="text" placeholder="Maria Garcia"/>
      <div class="attend-toggle">
        <button class="toggle-btn selected" id="btn-yes" onclick="setAttend(true)">🎉 Yes!</button>
        <button class="toggle-btn" id="btn-no" onclick="setAttend(false)">😢 No</button>
      </div>
      <button class="submit-btn" onclick="submitRSVP()">Send RSVP ⚡</button>
    </div>
  </div>
  <button class="back-btn" onclick="go('invite')">← Back</button>
</div>

<div id="screen-login" class="screen">
  <div class="card">
    <div class="card-header"><div class="header-name">Trainer Login</div></div>
    <div class="form-body">
      <div id="login-msg" class="form-msg error">Incorrect Credentials</div>
      <label class="form-label">Username</label>
      <input class="form-input" id="login-user" type="text"/>
      <label class="form-label">Password</label>
      <input class="form-input" id="login-pass" type="password"/>
      <button class="submit-btn" onclick="doLogin()">Login</button>
    </div>
  </div>
  <button class="back-btn" onclick="go('invite')">← Back</button>
</div>

<div id="screen-dashboard" class="screen">
  <div class="card">
    <div class="card-header"><div class="header-name">Guest List</div></div>
    <div class="dashboard-body">
      <div class="dash-tabs">
        <button class="dash-tab active" id="tab-yes" onclick="showTab('yes')">✅ Coming</button>
        <button class="dash-tab" id="tab-no" onclick="showTab('no')">❌ Absent</button>
      </div>
      <div class="dash-count" id="dash-count"></div>
      <div id="rsvp-list"></div>
      <button class="back-btn" onclick="go('invite')">Log Out</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://sheetdb.io/api/v1/b7rjdhyb0rmjw';
var attending = true;
var currentTab = 'yes';
var cachedRSVPs = [];

function go(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  window.scrollTo(0, 0);
  if (screen === 'dashboard') fetchRSVPs();
}

function setAttend(val) {
  attending = val;
  document.getElementById('btn-yes').classList.toggle('selected', val);
  document.getElementById('btn-no').classList.toggle('selected', !val);
}

async function submitRSVP() {
  const kid = document.getElementById('kid-name').value.trim();
  const adult = document.getElementById('adult-name').value.trim();
  const msg = document.getElementById('form-msg');
  const btn = document.querySelector('.submit-btn');

  if (!kid || !adult) {
    msg.textContent = "Please fill in both names.";
    msg.className = "form-msg error";
    msg.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Sending...";
  msg.style.display = "none";

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        data: [{
          kid: kid,
          adult: adult,
          attending: attending ? "TRUE" : "FALSE",
          date: new Date().toLocaleDateString()
        }]
      })
    });

    if (response.ok) {
      msg.textContent = attending ? "🎉 Can't wait to see " + kid + "!" : "😢 Thanks for letting us know.";
      msg.className = "form-msg success";
      msg.style.display = "block";
      document.getElementById('kid-name').value = '';
      document.getElementById('adult-name').value = '';
    } else {
      throw new Error();
    }
  } catch (e) {
    msg.textContent = "Connection error. Check Sheet headers!";
    msg.className = "form-msg error";
    msg.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Send RSVP ⚡";
  }
}

async function fetchRSVPs() {
  const list = document.getElementById('rsvp-list');
  list.innerHTML = '<div class="rsvp-empty">Loading guests...</div>';
  try {
    const response = await fetch(API_URL);
    const data = await response.json();
    cachedRSVPs = data.map(r => ({ ...r, attending: String(r.attending).toUpperCase() === "TRUE" }));
    renderDashboard();
  } catch (e) {
    list.innerHTML = '<div class="rsvp-empty">Error loading data.</div>';
  }
}

function renderDashboard() {
  const list = document.getElementById('rsvp-list');
  const filtered = cachedRSVPs.filter(r => currentTab === 'yes' ? r.attending : !r.attending);
  document.getElementById('dash-count').textContent = cachedRSVPs.length + ' Total Responses';
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="rsvp-empty">No responses yet.</div>';
    return;
  }
  list.innerHTML = filtered.map(r => `
    <div class="rsvp-item ${!r.attending ? 'declined' : ''}">
      <div class="rsvp-name">👦 ${esc(r.kid)}</div>
      <div class="rsvp-adult">👤 ${esc(r.adult)}</div>
    </div>
  `).join('');
}

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tab-yes').classList.toggle('active', tab === 'yes');
  document.getElementById('tab-no').classList.toggle('active', tab === 'no');
  renderDashboard();
}

function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  if (u === 'Benjamin' && p === 'IloveValentina') {
    go('dashboard');
  } else {
    document.getElementById('login-msg').style.display = 'block';
  }
}

function esc(str) { return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }
</script>
</body>
</html>
